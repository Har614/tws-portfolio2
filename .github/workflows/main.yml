name: Simple Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Copy Files to EC2 via SSH
      uses: appleboy/scp-action@master
      with:
        host: 3.89.104.48
        username: ubuntu
        key: ${{ secrets.PRIVATE_KEY }}
        source: "*"
        target: "/var/www/html"

    - name: Restart Server
      uses: appleboy/ssh-action@master
      with:
        host: 3.89.104.48
        username: ubuntu
        key: ${{ secrets.PRIVATE_KEY }}
        script: sudo systemctl restart nginx